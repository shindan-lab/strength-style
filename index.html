<!doctype html><html lang='ja'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1,viewport-fit=cover'><title>あなたの強みの出方診断</title><meta name='description' content='12の質問で、あなたの強みがどんな場面で自然に出やすいかがわかる読み物型診断ツールです。所要時間約2分。'><link rel='canonical' href='https://shindan-lab.github.io/strength-style/'><link rel='icon' href='favicon.png'><meta property='og:title' content='あなたの強みの出方診断｜「自分の良さって何だろう？」が少し見えてきます。'><meta property='og:description' content='12の質問で、あなたの強みがどんな場面で自然に出やすいかがわかる読み物型診断ツールです。所要時間約2分。'><meta property='og:url' content='https://shindan-lab.github.io/strength-style/'><meta property='og:type' content='website'><meta property='og:image' content='https://shindan-lab.github.io/strength-style/og-image.png'><meta name='twitter:card' content='summary_large_image'><meta name='twitter:title' content='あなたの強みの出方診断｜「自分の良さって何だろう？」が少し見えてきます。'><meta name='twitter:description' content='12の質問で、あなたの強みがどんな場面で自然に出やすいかがわかる読み物型診断ツールです。'><meta name='twitter:image' content='https://shindan-lab.github.io/strength-style/og-image.png'><meta name='theme-color' content='#C1714A'><meta property='og:locale' content='ja_JP'><meta property='og:site_name' content='あなたの強みの出方診断'><meta property='og:image:width' content='1200'><meta property='og:image:height' content='630'><link rel='preconnect' href='https://fonts.googleapis.com'><link rel='preconnect' href='https://fonts.gstatic.com' crossorigin><link href='https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap' rel='stylesheet'><style>body{font-family:"Noto Sans JP","Hiragino Kaku Gothic ProN",sans-serif;background:#FAF7F4;color:#3D2B1F;margin:0}main{max-width:480px;margin:0 auto;padding:24px 16px 48px}.card{background:#fff;border:1px solid #E8D5CE;border-radius:16px;padding:20px;margin-bottom:14px}.btn,.opt{display:block;width:100%;min-height:44px;border-radius:12px;font:inherit}.btn{border:none;background:#C1714A;color:#fff;padding:16px;cursor:pointer}.opt{background:#FAF7F4;border:1px solid #E8D5CE;color:#3D2B1F;text-align:left;padding:14px;margin:8px 0;cursor:pointer}.hide{display:none}.sub{color:#7A5C52}.center{text-align:center}.bar{height:4px;background:#E8D5CE;border-radius:4px;overflow:hidden}.fill{height:100%;background:#C1714A}.pill{display:inline-block;background:#FDF0EB;border:1px solid #E8D5CE;border-radius:999px;padding:4px 12px;color:#C1714A;font-size:13px}.label{font-size:11px;letter-spacing:.14em;color:#C1714A;font-weight:700;margin-bottom:10px}.hero{padding-top:40px}.h1{font-size:32px;font-weight:700;margin:0 0 8px}.h2{font-size:22px;font-weight:700;margin:0 0 8px}.typehead{border-radius:20px;padding:24px;color:#fff;margin-bottom:14px}.share a{display:inline-block;width:48%;text-align:center;background:#1A1A1A;color:#fff;text-decoration:none;padding:12px 0;border-radius:12px}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body><main><section id='top' class='hero center'><a href='https://shindan-lab.github.io/' style='letter-spacing:.18em;color:#C1714A;font-size:12px;margin-bottom:12px;text-decoration:none;display:block'>診断Lab</a><h1 class='h1'>あなたの強みの出方診断</h1><p style='color:#C1714A;font-weight:500'>「自分の良さって何だろう？」が、少し見えてきます。</p><div class='card' style='text-align:left'><p class='sub'>12の質問に答えるだけで、あなたの強みがどんな場面で自然に出やすいか、その“出方”がわかります。</p><div style='margin-top:12px'><span class='pill'>所要時間：約2分</span></div></div><button class='btn' onclick='start()'>診断をはじめる</button></section><section id='quiz' class='hide'><div class='sub' id='ptext'>1 / 12</div><div class='bar'><div class='fill' id='pbar' style='width:8.3%'></div></div><div style='margin:10px 0'><button onclick='back()' id='backbtn' style='background:none;border:none;color:#7A5C52;padding:0'>前の問題に戻る</button></div><div class='card'><div id='q' style='font-weight:700;line-height:1.7'></div><div id='opts'></div></div></section><section id='loading' class='hide center' style='padding-top:100px'><div style='width:48px;height:48px;border:4px solid #E8D5CE;border-top-color:#C1714A;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 24px'></div><div class='sub' style='font-size:16px;font-weight:500'>あなたの強みの出方を分析中…</div></section><section id='result' class='hide'><div id='head' class='typehead'></div><div class='card'><div class='label'>診断結果</div><div id='headline' style='font-weight:700;line-height:1.7;margin-bottom:12px'></div><div id='body' style='line-height:1.9'></div></div><div class='card' style='background:#FDF0EB'><div class='label'>あなたへ</div><div id='letter' style='line-height:1.9'></div></div><div class='card' style='border:2px solid #C1714A'><div class='label'>活かし方のヒント</div><div id='pres' style='line-height:1.9'></div></div><div id='subtype' class='card sub hide'></div><div id='aff' class='card hide'><div style='display:flex;align-items:center;gap:8px;margin-bottom:10px'><div class='label' style='margin-bottom:0'>もし気になったら</div><span style='font-size:9px;font-weight:700;color:#B0978E;background:#F0E4DE;padding:2px 6px;border-radius:3px;letter-spacing:.05em'>PR</span></div><a id='afflink' target='_blank' rel='noopener noreferrer' style='text-decoration:none;color:inherit'><div id='afft' style='font-weight:700'></div><div id='affd' class='sub' style='margin-top:6px'></div><div style='margin-top:10px;color:#BF4500;font-weight:700'>楽天で見る →</div></a></div><div class='share'><a id='sx' target='_blank' rel='noopener noreferrer'>Xでシェア</a> <a id='st' target='_blank' rel='noopener noreferrer'>Threadsでシェア</a></div><button class='btn' style='margin-top:12px;background:#fff;color:#7A5C52;border:1px solid #E8D5CE' onclick='resetQuiz()'>もう一度診断する</button></section><footer style='margin-top:56px;padding:28px 0 20px;text-align:center;border-top:1px solid #E8D5CE'><div style='font-size:17px;font-weight:700;color:#3D2B1F;margin-bottom:10px'>診断<em style='font-style:normal;color:#C1714A'>Lab</em></div><div style='font-size:12px;color:#7A5C52;margin-bottom:14px'>あなたの「なんか」を、言葉にする。</div><div style='font-size:11px;color:#B0978E'>© 2025 診断Lab</div></footer></main><script src='affiliate.js'></script><script>const C={A:'#DB2777',B:'#2563EB',C:'#0F766E',D:'#D97706',E:'#7C3AED',F:'#6B7280',G:'#059669',H:'#1D4ED8'};const Q=[['誰かが困っている場面で、いちばん自然に出やすい動きは？',[['必要そうなことをそっと手伝う',{A:3}],['状況を整理して見通しをつくる',{B:3}],['何が問題か先に気づいて伝える',{C:3}],['自分から最初の一歩を動かす',{D:3}]]],['話がまとまっていない場面で、自分がやりがちなのは？',[['伝わる言葉に言い換える',{E:3}],['背景や本質をもう少し考える',{F:3}],['空気が重くなりすぎないようにする',{G:3}],['人と人のつながり方や相性が気になる',{H:3}]]],['人が集まる場で、自然に出やすい役割は？',[['目立たないところを支えること',{A:3}],['全体がやりやすい流れを整えること',{B:3}],['小さな違和感に先に気づくこと',{C:3}],['最初の動き出しをつくること',{D:3}]]],['周囲から「助かった」と言われやすいのは？',[['説明がわかりやすいこと',{E:3}],['ちゃんと考えてくれること',{F:3}],['場が話しやすくなること',{G:3}],['人と人のあいだをうまくつなぐこと',{H:3}]]],['自分では普通だと思っているけれど、人に驚かれやすいのは？',[['支えることを自然にやっていること',{A:3}],['混乱を見やすく整えられること',{B:3}],['変化や違和感にすぐ気づくこと',{C:3}],['迷っている空気を前に動かせること',{D:3}]]],['説明が難しいことに出会ったとき、自分の反応に近いのは？',[['相手に伝わる言い方を探したくなる',{E:3}],['まず中身を深く理解したくなる',{F:3}],['場が重くならないように気にする',{G:3}],['誰とどう共有すると動きやすいか考える',{H:3}]]],['誰かがまだ慣れていない場面で、自分に近いのは？',[['困っている部分をそっと支える',{A:3}],['やりやすい形に整えてあげたくなる',{B:2,H:1}],['つまずきそうな点に先に気づく',{C:3}],['まず一緒に最初の一歩をつくる',{D:3}]]],['会話や説明の場で、自分らしさが出やすいのは？',[['曖昧なことを言葉にできるとき',{E:3}],['表面だけで終わらず深く考えられるとき',{F:3}],['緊張を少しやわらげられるとき',{G:3}],['別々の考えをつないで流れをつくれるとき',{H:3}]]],['仕事や家事で「自分らしさが出る」のはどんな場面？',[['誰かがやりやすくなるように動く場面',{A:3}],['手順や流れを整える場面',{B:3}],['小さな変化に先に気づく場面',{C:3}],['よし、やろうと流れをつくる場面',{D:3}]]],['複数の人や話題があるとき、得意寄りなのは？',[['必要な支えが足りていない所を見つけること',{A:2}],['情報や役割を整理すること',{B:3}],['見落とされやすい変化を拾うこと',{C:3}],['人や考えの接点を見つけること',{H:3}]]],['褒められても自分ではピンと来にくいのは？',[['支えてくれて助かる',{A:3}],['整えてくれて助かる',{B:3}],['気づくのが早い',{C:3}],['言葉にするのがうまい',{E:3}]]],['もし「あなたの良さ」を一番発揮しやすい場面を選ぶなら？',[['人が安心して動けるようにするとき',{G:2,A:1}],['本質まで考えて意味を深めるとき',{F:3}],['止まりそうな流れを前に進めるとき',{D:2,B:1}],['人や可能性の間によい流れをつくるとき',{H:3}]]]];const T={A:['支える力が出るタイプ','あなたの強みは、『前に出ること』より『ちゃんと支えること』で自然に出ています','誰かが困っていたら自然に手を貸す。目立たないところで抜けを埋める。表に立つ人が動きやすいように、そっと支える。あなたは、そういう役回りの中で強みが出やすい人です。自分では“たいしたことじゃない”と思っていても、その安心感に救われている人は少なくありません。\n\n支える力は、派手ではないぶん見落とされやすいです。でも、組織でも家庭でも、物事がちゃんと回る背景にはこういう力があります。あなたの強みは、土台をつくること。前に立つ人だけが価値を出しているわけではありません。','あなたが自然にやってきたことは、ただの気遣いではなく、ちゃんと人や場を支える力です。それを当たり前にできてしまうところに、あなたのすごさがあります。','最近「これなら自然にできた」と思える場面を一つ思い出してみてください。目立たなくても、支えた事実を自分で受け取ることが、強みを活かす第一歩になります。'],B:['整える力が出るタイプ','あなたの強みは、散らかったものを『わかる形』に整えるときに自然に出ています','話があちこちに飛んでいると整理したくなる。曖昧な状態を見ると、順番や形をつけたくなる。バラバラな情報を、みんなが動きやすい形に整える。あなたは、混乱を減らすことで力を発揮しやすい人です。\n\n整える力は、ただ几帳面ということではありません。人が安心して動ける土台をつくる力です。見通しが立つだけで、人はかなり楽になります。最後まで着地させる力も、この強みの延長にあります。あなたは、その“見えにくい安心”をつくれる人です。','あなたが整えることで、周りの人は思っている以上に助かっています。自分では普通にやっていることでも、それは立派な価値です。','今日ひとつだけ、「自分は整えるのが得意かもしれない」と感じた場面をメモしてみてください。得意は、無意識にやっていることの中にあることが多いです。'],C:['気づく力が出るタイプ','あなたの強みは、小さな違和感や変化に『先に気づけること』です','少し元気がない人に気づく。話のズレや違和感を先に感じる。見落とされやすい部分に、自然と目が行く。あなたは、表に出る前のサインを拾える人です。そういう感度は、本人が思う以上に大きな強みです。\n\n気づく力は、繊細さと近いところにあります。だからこそ、自分では“気にしすぎかな”と思ってしまうこともあるかもしれません。でも、その早さや細やかさがあるから防げること、助けられることは本当に多いんです。','みんなが見過ごすところに気づけるのは、あなたの感度が高いからです。その力は、ちゃんと人の役に立っています。','最近「これ、自分だけ先に気づいたかも」と思ったことを一つ書いてみてください。気づく力は、意識して受け取るほど自信につながります。'],D:['前に進める力が出るタイプ','あなたの強みは、止まりそうな空気に『最初の一歩』をつくれることです','迷っている場面で、とりあえずやってみようと言える。考えるだけで止まりそうなとき、まず動き出せる。あなたは、物事の“始まり”をつくる場面で強みが出る人です。\n\n前に進める力は、勢いだけではありません。みんなが不安で止まっているときに、一歩分の勇気を出せることです。その一歩があるから、流れが動き出します。動き出したあとを持ち直す力も、この強みの中に含まれています。あなたは、停滞をほどく役割を自然に担える人です。','動き出せる人って、それだけで周りの景色を変えるんですよね。あなたの一歩に助けられた人は、きっとたくさんいます。','最近「自分が動いたから少し進んだ」ことを一つ思い出してみてください。その感覚を言葉にできると、あなたの強みはもっと使いやすくなります。'],E:['言葉にする力が出るタイプ','あなたの強みは、曖昧なものを『伝わる言葉』に変えられることです','うまく説明できないことを、わかる形に言い換えられる。誰かの気持ちや状況を、聞いた人が理解しやすい言葉にできる。あなたは、言葉を使って橋をかける場面で強みが出る人です。\n\n言葉にする力は、話がうまいことだけではありません。伝わらないものを、伝わるところまで持っていけることです。説明、翻訳、共有、その全部に価値があります。あなたの言葉があることで、安心できる人がいます。','「なんとなく」を「なるほど」に変えられるのは、立派な力です。言葉にすることは、想像以上に人を助けています。','最近、誰かに説明して「わかりやすい」と言われたことがあれば、軽くメモしてみてください。あなたの強みは、そういう場面にすでに出ています。'],F:['深める力が出るタイプ','あなたの強みは、表面だけで終わらず『本質まで見に行けること』です','すぐに結論を出すより、背景や理由まで見たくなる。見えていることの奥に何があるのかを自然に考える。あなたは、浅く流さずに掘り下げる場面で強みが出る人です。\n\n深める力は、スピードだけを求める場では見えにくいことがあります。でも、本当に大事な判断や、人の気持ちを扱う場面では、この力が大きな価値になります。あなたは、簡単に雑にしない人です。','考えすぎではなく、ちゃんと考えられる人なんですよね。その深さがあるから見えることが、確かにあります。','最近「自分だからここまで考えた」と思えることを一つ思い出してみてください。深める力は、時間がかかっても強い価値になります。'],G:['場をやわらげる力が出るタイプ','あなたの強みは、緊張や重さを『少しやわらげること』で自然に出ています','人が話しやすい空気をつくる。張りつめた場を少し軽くする。強く引っ張るわけではないのに、あなたがいると何となくやりやすくなる。そんな場面があるなら、それは立派な強みです。\n\n場をやわらげる力は、目に見える成果として数えにくいです。でも、人が安心して動ける空気は、それだけで大きな価値があります。あなたは、空気を整えることで周りの力を引き出しやすい人です。','「あなたがいると話しやすい」は、とても大きな強みです。やさしさや柔らかさは、ちゃんと場を変える力になります。','最近、自分が入ったことで少し空気がやわらいだ場面を思い出してみてください。見えにくい強みほど、意識して受け取ることが大切です。'],H:['つないで育てる力が出るタイプ','あなたの強みは、人や可能性のあいだに『よい流れ』をつくれることです','この人とこの人は相性が良さそう。今はまだ慣れていないけれど、この人は伸びそう。別々に見えていたものの間に接点や可能性を見つける。あなたは、人や関係の先をよくしていく場面で強みが出る人です。\n\nつないで育てる力は、仲介することだけではありません。孤立を減らし、流れをよくし、相手の伸びしろを信じながら関わることです。急がせすぎず、でもちゃんと前に進む関わり方ができる。あなたは、長い目で人や場をよくしていける人です。','あなたが間に入ることで、うまく流れたことや、安心して伸びられた人がきっといたはずです。その関わり方は、目立たなくても本当に大きな力です。','最近「自分がつないだから進んだ」「この人が前よりやりやすそうだった」と感じた場面を一つ思い返してみてください。あなたの強みは、関係の流れをよくするところにすでに出ています。']};function calc(){const s={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0};answers.forEach(a=>Object.entries(a).forEach(([k,v])=>s[k]+=v));const x=Object.entries(s).sort((a,b)=>b[1]-a[1]);return{main:x[0][0],sub:x[1][0]}}function share(main){const url='https://shindan-lab.github.io/strength-style/';return `私の強みの出方は「${T[main][0]}」でした。\n自分の良さって、こういう場面で出るのかも。\n\n▼あなたの強みの出方診断\n${url}\n\n#強みの出方診断 #診断Lab`}let i=0,answers=[];function sc(id){['top','quiz','loading','result'].forEach(x=>document.getElementById(x).classList.add('hide'));document.getElementById(id).classList.remove('hide');window.scrollTo({top:0,behavior:'instant'})}function render(){document.getElementById('ptext').textContent=`${i+1} / ${Q.length}`;document.getElementById('pbar').style.width=((i+1)/Q.length*100)+'%';document.getElementById('backbtn').disabled=i===0;document.getElementById('q').textContent=Q[i][0];const o=document.getElementById('opts');o.innerHTML='';Q[i][1].forEach(it=>{const b=document.createElement('button');b.className='opt';b.textContent=it[0];b.onclick=()=>{answers[i]=it[1];if(i<Q.length-1){i++;render()}else{sc('loading');setTimeout(show,1200)}};o.appendChild(b)})}function start(){i=0;answers=[];sc('quiz');render()}function back(){if(i>0){i--;render()}}function show(){const r=calc(),m=T[r.main],s=T[r.sub];document.getElementById('head').style.background=C[r.main];document.getElementById('head').innerHTML=`<div style='font-size:11px;letter-spacing:.18em;opacity:.9'>あなたの強みタイプ</div><div class='h2'>${m[0]}</div>`;document.getElementById('headline').textContent=m[1];document.getElementById('body').innerHTML=m[2].split('\n\n').map(x=>`<p>${x}</p>`).join('');document.getElementById('letter').textContent=m[3];document.getElementById('pres').textContent=m[4];const st=document.getElementById('subtype');st.textContent=`今のあなたには「${s[0]}」の傾向も少しあります。`;st.classList.remove('hide');if(typeof affiliateData!=='undefined'&&affiliateData[r.main]&&affiliateData[r.main].url){document.getElementById('aff').classList.remove('hide');document.getElementById('afft').textContent=affiliateData[r.main].title;document.getElementById('affd').textContent=affiliateData[r.main].desc;document.getElementById('afflink').href=affiliateData[r.main].url}else{document.getElementById('aff').classList.add('hide')}const sh=encodeURIComponent(share(r.main));document.getElementById('sx').href='https://twitter.com/intent/tweet?text='+sh;document.getElementById('st').href='https://www.threads.net/intent/post?text='+sh;sc('result')}function resetQuiz(){sc('top')}</script></body></html>
